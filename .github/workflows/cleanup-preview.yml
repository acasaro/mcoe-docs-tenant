name: Cleanup preview channel

# Deletes the Firebase Hosting Preview Channel for a branch the moment
# the branch is removed from GitHub. Fires for any branch deletion —
# auto-merge cleanup, manual delete via UI/CLI, force-deletes, etc.
#
# Without this workflow the channel sticks around until its 7-day TTL
# expires, which is wasteful (channel quota is finite) and confusing
# (the channel list in Firebase Console accrues stale entries you can't
# tell apart from active ones at a glance).
#
# `delete` events fire on the deleted ref. `ref_type` distinguishes
# branch from tag — we only want branch deletions.
#
# Idempotent: deleting a non-existent channel returns a non-zero exit
# from firebase-tools, swallowed via `|| true`.

on:
  delete:
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch name to clean up the channel for (manual run)"
        required: true

permissions:
  id-token: write
  contents: read

jobs:
  cleanup:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.ref_type == 'branch' }}
    runs-on: uhg-runner

    steps:
      # Need firebase.json in cwd; firebase CLI's `hosting:channel:delete`
      # bails with "Not in a Firebase app directory" otherwise. Checkout
      # main explicitly since the deleted branch (default checkout target)
      # no longer exists.
      - name: Checkout tenant (main)
        uses: actions/checkout@v6
        with:
          ref: main

      - name: Configure JFrog SaaS Connection
        uses: uhg-pipelines/epl-jf/configure-saas-connection@v4
        with:
          jfrog-url: https://centraluhg.jfrog.io
          jfrog-edge-url: https://centraluhg.jfrog.io
          jfrog-project-key: glb
          npm-setup: true

      - name: Fix pnpm auth for JFrog virtual repos
        run: |
          TOKEN=$(grep 'glb-npm-vir/:_authToken=' ~/.npmrc | sed 's/.*_authToken=//')
          echo "//centraluhg.jfrog.io/:_authToken=${TOKEN}" >> ~/.npmrc

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install Firebase CLI
        run: npm install --global firebase-tools

      # Write the service-account JSON to disk and point GOOGLE_APPLICATION_CREDENTIALS
      # at it so firebase-tools authenticates as the Hosting deploy SA.
      - name: Authenticate
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_MCOE_D }}' > "${{ runner.temp }}/firebase-sa.json"
          echo "GOOGLE_APPLICATION_CREDENTIALS=${{ runner.temp }}/firebase-sa.json" >> "$GITHUB_ENV"

      # Same sanitization as deploy.yml so the channel ID matches.
      - name: Compute channel ID
        id: channel
        env:
          REF_NAME: ${{ github.event.inputs.branch || github.event.ref }}
        run: |
          SANITIZED=$(echo "$REF_NAME" \
            | tr '[:upper:]' '[:lower:]' \
            | sed -E 's/[^a-z0-9-]/-/g; s/-+/-/g; s/^-+//; s/-+$//' \
            | cut -c -56)
          echo "id=branch-${SANITIZED}" >> "$GITHUB_OUTPUT"

      # Delete the channel. If it's already gone (the original `|| true`
      # case) treat that as success; surface anything else as a real
      # failure so we don't get silent green runs while the channel sits
      # untouched (the bug that masked the missing-checkout issue above).
      - name: Delete preview channel
        env:
          CHANNEL_ID: ${{ steps.channel.outputs.id }}
        run: |
          set +e
          out=$(firebase hosting:channel:delete "$CHANNEL_ID" \
            --site mcoe-docs \
            --project "${{ vars.FIREBASE_PROJECT_ID }}" \
            --force 2>&1)
          status=$?
          set -e
          echo "$out"
          if [ $status -eq 0 ]; then
            exit 0
          fi
          if echo "$out" | grep -qiE "could not find|does not exist|not found"; then
            echo "Channel '$CHANNEL_ID' already deleted — treating as success."
            exit 0
          fi
          echo "::error::firebase hosting:channel:delete failed for '$CHANNEL_ID'"
          exit "$status"
