name: Deploy docs

# Tenant deploy — Firebase Hosting + branch-keyed Preview Channels.
#
# - push to main           → build → deploy to the live channel.
# - push to any other branch → build → deploy to channel `branch-<sanitized>`.
#                              Channel ID is deterministic from the branch name
#                              (lowercased, non-alphanum chars → `-`), so every
#                              push to the same branch updates the SAME URL.
#                              No PR is required for a preview to exist.
#
# Channels auto-expire after 7 days of inactivity (Firebase TTL). Each new
# deploy resets the timer, so an active branch's preview stays alive
# indefinitely; a stale branch's preview self-cleans without explicit
# cleanup. The previous cleanup-preview.yml workflow is therefore unneeded.
#
# Required secrets:
#   FIREBASE_SERVICE_ACCOUNT_MCOE_D   JSON of a Firebase Hosting deploy SA on mcoe-d
#                                     (set automatically by `firebase init hosting:github`)
#   NEBULA_RECORD_PREVIEW_SECRET      Matches Firebase secret DEV_RECORD_PREVIEW_SECRET
#
# Required variables:
#   FIREBASE_PROJECT_ID               e.g. mcoe-d
#   NEBULA_RECORD_PREVIEW_URL         The deployed function endpoint

on:
  workflow_dispatch:
  push:
    branches: ['**']
    # Skip runs for changes that don't affect the rendered site — README
    # tweaks, dependabot config edits, .gitignore changes, etc. Editor-
    # driven saves always touch content/ so this doesn't gate the main
    # flow.
    paths:
      - 'content/**'
      - 'public/**'
      - 'assets/**'
      - 'snippets/**'
      - 'docs.json'
      - 'theme.json'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '.firebaserc'
      - 'firebase.json'
      - '.github/workflows/deploy.yml'
  # `create` fires when a ref is first created via the GitHub API. The
  # editor's "Create branch" UX only creates a ref (no commits beyond the
  # base), which doesn't fire `push` — so without `create` here, a new
  # branch sits without a preview channel until the first save. Adding
  # this means the channel is provisioned immediately and the editor's
  # in-flight notification has something to track.
  create:

permissions:
  id-token: write
  contents: read

# Cancel any in-flight build for the same branch — only the latest commit's
# preview matters.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-deploy:
    # `create` fires on tag creation too; we only want branches. push +
    # workflow_dispatch always pass.
    if: ${{ github.event_name != 'create' || github.event.ref_type == 'branch' }}
    runs-on: uhg-runner

    steps:
      - name: Checkout tenant
        uses: actions/checkout@v6

      - name: Configure JFrog SaaS Connection
        uses: uhg-pipelines/epl-jf/configure-saas-connection@v4
        with:
          jfrog-url: https://centraluhg.jfrog.io
          jfrog-edge-url: https://centraluhg.jfrog.io
          jfrog-project-key: glb
          npm-setup: true

      - name: Fix pnpm auth for JFrog virtual repos
        run: |
          TOKEN=$(grep 'glb-npm-vir/:_authToken=' ~/.npmrc | sed 's/.*_authToken=//')
          echo "//centraluhg.jfrog.io/:_authToken=${TOKEN}" >> ~/.npmrc

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'

      # Activate pnpm via Node's built-in corepack — respects the
      # `packageManager` field in package.json. Avoids the ~15s
      # `npm install -g pnpm` of the previous step.
      - name: Enable corepack
        run: corepack enable

      # Cache the pnpm content-addressable store. On cache hit `pnpm
      # install` only resolves the dependency graph + symlinks; no network
      # fetches. Cuts install from ~1-2min cold to ~10-15s warm.
      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-${{ runner.os }}-

      - name: Install
        run: pnpm install --frozen-lockfile

      # Cache Astro's per-tenant compiled output. Key on content + the
      # CLI version, so an `@nebula-docs/cli` bump invalidates correctly.
      - name: Cache Astro build
        uses: actions/cache@v4
        with:
          path: |
            .astro
            node_modules/.astro
          key: astro-${{ hashFiles('content/**', 'docs.json', 'theme.json', 'pnpm-lock.yaml') }}

      - name: Build docs
        run: pnpm nebula build

      # Compute channel ID + whether this is a live deploy in one shell step
      # so the conditional logic + branch-name sanitization is in one place.
      # Sanitization: lowercase, replace non-alphanumeric-or-hyphen with `-`,
      # collapse runs of `-`, strip leading/trailing `-`, truncate to 56 chars
      # so the prefixed channel ID stays under Firebase's 63-char limit.
      - name: Compute channel ID
        id: channel
        run: |
          REF_NAME="${{ github.ref_name }}"
          if [ "$REF_NAME" = "main" ]; then
            echo "id=live" >> "$GITHUB_OUTPUT"
            echo "is-live=true" >> "$GITHUB_OUTPUT"
          else
            SANITIZED=$(echo "$REF_NAME" \
              | tr '[:upper:]' '[:lower:]' \
              | sed -E 's/[^a-z0-9-]/-/g; s/-+/-/g; s/^-+//; s/-+$//' \
              | cut -c -56)
            echo "id=branch-${SANITIZED}" >> "$GITHUB_OUTPUT"
            echo "is-live=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Authenticate Firebase
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_MCOE_D }}' > "${{ runner.temp }}/firebase-sa.json"
          echo "GOOGLE_APPLICATION_CREDENTIALS=${{ runner.temp }}/firebase-sa.json" >> "$GITHUB_ENV"

      # `pnpm exec firebase` resolves to firebase-tools installed as a
      # tenant devDep — cached via the pnpm store, no separate global
      # install step. Saves ~30-60s vs `npm install -g firebase-tools`.
      #
      # Two deploy steps because `hosting:channel:deploy` doesn't support
      # the live channel, and `deploy --only hosting` doesn't support expires.
      - name: Deploy live (main)
        if: steps.channel.outputs.is-live == 'true'
        run: |
          pnpm exec firebase deploy --only hosting:docs \
            --project "${{ vars.FIREBASE_PROJECT_ID }}" \
            --force

      - name: Deploy preview channel (branch)
        id: deploy-preview
        if: steps.channel.outputs.is-live != 'true'
        run: |
          OUTPUT=$(pnpm exec firebase hosting:channel:deploy "${{ steps.channel.outputs.id }}" \
            --only docs \
            --project "${{ vars.FIREBASE_PROJECT_ID }}" \
            --expires 7d \
            --json)
          echo "$OUTPUT"
          URL=$(echo "$OUTPUT" | jq -r '.result["mcoe-docs"].url // empty')
          if [ -z "$URL" ]; then
            URL=$(echo "$OUTPUT" | jq -r '.. | .url? // empty' | head -1)
          fi
          echo "details_url=$URL" >> "$GITHUB_OUTPUT"

      # Send the channel URL back to recordPreview so the dashboard subscription
      # can surface the Preview button. Skipped on live deploys (the live URL
      # is the deployment.domain on the dashboard, not a previewUrl).
      - name: Notify recordPreview
        if: steps.deploy-preview.outputs.details_url != '' && vars.NEBULA_RECORD_PREVIEW_URL != ''
        env:
          PREVIEW_URL: ${{ steps.deploy-preview.outputs.details_url }}
          RUN_ID: ${{ github.run_id }}
          REPO_FULL_NAME: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
          ENDPOINT: ${{ vars.NEBULA_RECORD_PREVIEW_URL }}
          SECRET: ${{ secrets.NEBULA_RECORD_PREVIEW_SECRET }}
        run: |
          curl --fail-with-body --silent --show-error \
            -X POST "$ENDPOINT" \
            -H "Authorization: Bearer $SECRET" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
                  --argjson runId "$RUN_ID" \
                  --arg previewUrl "$PREVIEW_URL" \
                  --arg repoFullName "$REPO_FULL_NAME" \
                  --arg branch "$BRANCH" \
                  '{runId: $runId, previewUrl: $previewUrl, repoFullName: $repoFullName, branch: $branch}')"
